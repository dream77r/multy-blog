name: Deploy to fi-vmmini

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/dreamwallet/projects/multy-blog
            git pull origin main
            npm install
            npx prisma generate
            npx prisma db push --accept-data-loss
            npm run build
            pm2 reload multy-blog || pm2 start npm --name multy-blog -- start -- -p 3400

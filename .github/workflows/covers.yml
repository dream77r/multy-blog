name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Find and copy covers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo "=== Finding cover files ==="
            find /home -name "2026-03-06-game-cover*.png" 2>/dev/null || echo "not found in /home"
            find /var /opt /root -name "2026-03-06-game-cover*.png" 2>/dev/null || echo "not found elsewhere"
            ls /home/ 2>/dev/null
            ls /home/openclaw/ 2>/dev/null || echo "no openclaw dir"

name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            BLOG=/home/dreamwallet/projects/multy-blog
            echo "=== package.json start script ==="
            cat $BLOG/package.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('scripts',{}))"
            echo "=== .next/standalone exists? ==="
            ls $BLOG/.next/standalone/ 2>/dev/null | head -5 || echo "NO standalone dir"
            echo "=== public/ contents ==="
            ls -la $BLOG/public/
            echo "=== uploads in public ==="
            ls $BLOG/public/uploads/ 2>/dev/null | head -10 || echo "no uploads dir in public"
            echo "=== where does next serve from? ==="
            ps aux | grep -E "next|node.*server" | grep -v grep | head -5
            echo "=== find uploaded files ==="
            find $BLOG -name "*.png" 2>/dev/null | head -10

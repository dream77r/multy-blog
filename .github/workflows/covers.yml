name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Check WAL and shared
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3m
          script: |
            source /home/dreamwallet/projects/multy-blog/.env
            echo "=== pg_wal check ==="
            psql "$DATABASE_URL" -c "SELECT pg_walfile_name(pg_current_wal_lsn());" 2>/dev/null || true

            echo "=== Check if articles had content before (pg_stat) ==="
            psql "$DATABASE_URL" -c "SELECT slug, \"createdAt\", \"updatedAt\", length(content) FROM \"Article\" ORDER BY \"updatedAt\";" 2>/dev/null

            echo "=== shared on VPS 100.113.28.78 - skip (different server) ==="
            echo "=== check /home/openclaw/shared ==="
            ls /home/openclaw/.openclaw/shared/ 2>/dev/null | head -20 || echo "no access"

            echo "=== find any md/txt article files ==="
            find /home/dreamwallet /home/openclaw -name "*.md" -newer /home/dreamwallet/projects/multy-blog/.env 2>/dev/null | grep -v "node_modules\|\.git" | head -10 || true

name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Check backups
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo "=== pg_dump backups ==="
            find /home/dreamwallet /var/backups /tmp -name "*.sql" -o -name "*.dump" -o -name "*multy*backup*" 2>/dev/null | head -10

            echo "=== DB content check ==="
            source /home/dreamwallet/projects/multy-blog/.env
            psql "$DATABASE_URL" -c "SELECT slug, length(content) as content_len, LEFT(content,100) as preview FROM \"Article\" ORDER BY \"publishedAt\" DESC NULLS LAST;"

            echo "=== pg_wal / pg_basebackup check ==="
            find /var/lib/postgresql -name "*.sql" 2>/dev/null | head -5 || true

            echo "=== git log ==="
            cd /home/dreamwallet/projects/multy-blog && git log --oneline -10

            echo "=== shared dir on this server ==="
            ls ~/.openclaw/shared/ 2>/dev/null || echo "no shared dir"
            ls /home/openclaw/.openclaw/shared/ 2>/dev/null | head -10 || echo "no openclaw shared"

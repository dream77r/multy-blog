name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Copy covers and update DB
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            BLOG=/home/dreamwallet/projects/multy-blog
            ARTIST=/home/openclaw/.openclaw/workspace-artist

            echo "=== Checking permissions ==="
            ls -la $ARTIST/2026-03-06-game-cover-*.png 2>/dev/null || echo "no access to artist dir"

            echo "=== Trying to copy via sudo ==="
            sudo cp $ARTIST/2026-03-06-game-cover-1.png $BLOG/public/covers/cover-1.png 2>/dev/null || \
              echo "sudo failed, trying chmod"

            echo "=== Checking next.config ==="
            grep -i "output\|standalone" $BLOG/next.config.* 2>/dev/null || echo "no standalone config"

            echo "=== Checking PM2 config ==="
            pm2 show multy-blog | grep -E "script|cwd|exec" 2>/dev/null | head -5

            echo "=== Public dir contents ==="
            ls $BLOG/public/ 2>/dev/null
            ls $BLOG/.next/standalone/ 2>/dev/null || echo "no standalone dir"

name: Update covers

on:
  workflow_dispatch:
  push:
    branches: [covers-trigger]

jobs:
  covers:
    runs-on: ubuntu-latest
    steps:
      - name: Update coverImage in DB
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            set -e
            source /home/dreamwallet/projects/multy-blog/.env
            psql "$DATABASE_URL" -c "UPDATE \"Article\" SET \"coverImage\"='/uploads/28b0d7fd-a5e2-46c2-b903-14ff8379f41a.png', \"coverImageUrl\"='/uploads/28b0d7fd-a5e2-46c2-b903-14ff8379f41a.png' WHERE slug='ii-agent-vmesto-menedzhera-telegram-bot-chatgpt-prodazhi';"
            psql "$DATABASE_URL" -c "UPDATE \"Article\" SET \"coverImage\"='/uploads/e05b8165-3720-479e-9e24-8ca030d6cf61.png', \"coverImageUrl\"='/uploads/e05b8165-3720-479e-9e24-8ca030d6cf61.png' WHERE slug='contentnaya-voronka-telegram-kanal-mashina-prodazh';"
            psql "$DATABASE_URL" -c "UPDATE \"Article\" SET \"coverImage\"='/uploads/fcdb075b-98d5-462d-af01-d9b4293e185e.png', \"coverImageUrl\"='/uploads/fcdb075b-98d5-462d-af01-d9b4293e185e.png' WHERE slug='telegram-mini-app-magazin-zapis-uslugi-bez-mobilnogo';"
            psql "$DATABASE_URL" -c "SELECT slug, \"coverImage\" FROM \"Article\" ORDER BY \"publishedAt\" DESC NULLS LAST;"
